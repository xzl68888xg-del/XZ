server {
    listen 80;
    server_name admin.xuanguang-core.internal; # 管理后台内网域名
    root /var/www/my-sys-monorepo/apps/admin-web/dist; # 对应 pnpm build 输出的物理路径
    index index.html;

    # 强效防劫持与跨域安全头
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # 单页面路由（React Router）核心兜底配置
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 核心网关反向代理 - 将前端的 /api 请求无感转发给后端的 Fastify 服务
    location /api/ {
        proxy_pass http://127.0.0.1:3000; # server-api 实际监听的端口
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }
}
